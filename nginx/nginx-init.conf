# Temporary HTTP-only config used during first certificate issuance.
# After init-letsencrypt.sh succeeds, Nginx reloads with nginx.conf.

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
